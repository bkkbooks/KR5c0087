body:
  text: 無名氏解絶學無憂章第二十絶學無憂學將以窮理理之不窮無以盡性無以盡性則荒惑憂樂不召而來矣今以云絶學者學已至于窮理其性得矣性之得也樂莫大焉此所以無憂唯之與阿相去幾何善之與惡相去何若處道之眞無分于僞得性之善無别于惡眞有所失則僞從而生焉善有所遷惡從而出焉則眞僞之相去善惡之相離固不遠矣在體道者以覺之人之所畏不可不畏聖人退而居密隱而守靜優游從容以樂于天眞沖和廉正以掌其夭宰明而燭物而不與種種分别高而越世而不與事事爭鋒斯乃處一己之道而不同物也及常以同俗和不異衆言與物交跡同民患而吉凶之憂有所不免此人之所畏所以不可不畏也衆人熙熙如享太牢如登春臺見道而不識由道而不知六情蔽于靈淵五賊亂于眞宰此乃衆人耳彼衆人不知性之失也逐情而喜耽物而樂熙熙以從己之欲𣰉𣰉而隨時之態則自以爲樂如享太牢與登春臺者享太牢以爲美登春臺以爲榮二者之樂曾可以衆人能之惟至樂者可以也我獨怕兮其未兆如嬰兒之未孩俗人昭昭我獨若昏俗人察察我獨悶悶道之散因于純變而爲雜性之失因于和適而爲駮吐華于外而實必中損遷眞于物而精必中耗或機巧興于大僞奸詐出于多途則吾道彼不得也我則異此含和而智慮不萌守一而眞純不散忘喜怒以塞其情攻愛惡而無其意如物象未兆之先若嬰兒未孩之始此非全性體道孰能若此惟其全性也常以自缺惟其體道也常以自弱自缺以爲天下之全自弱以爲天下之强此所以常與俗人異矣故彼之昭昭者我則若昏彼之察察我則悶悶也澹兮其若海飂兮似無所止虚靜以處己淵深而待物此乃道之體也故澹以若海普以濟天下博而散萬物此乃道之用也故飂以無止衆人皆有以我獨頑且鄙我道也彼物也物非道則不生道無物則爲常我且居道之常而物如何哉以此明物爲我用我非物役故也乃衆人皆有以也我獨頑且鄙者不能入不能取之理歟我獨異於人而貴求食於母以言其先則爲象之未兆以言其尊則爲帝之未出天地爲大以道爲始萬物爲多以道爲母母者有生養之道我今居以乆視不欲生乎達于修眞不欲養乎既生且養捨道何以故貴食母也孔德之容章第二十一孔德之容惟道是從道不可學由性而率則率性者固得其道也道得于我則我之所養者爲眞所施者爲德而德於是得于道在我之後而人可以修之也然而道則爲無德則爲有德至而入于道道優而散于德則道德之相從未嘗可相離也而經以孔德之容惟道是從其理若此道之爲物唯恍唯惚惚兮恍其中有象恍兮惚其中有物窈兮冥兮其中有精其精甚具其中有信自古及今其名不去以閲衆甫吾何以知衆甫之然哉以此道之至寂則靜不可以聽道之至無則虚不可以觀欲前而迎焉無首之可向欲後而隨焉無尾之可趨此大道之體以居其常也方將離體而涉于用不可爲無而無其名不可爲無而無其狀此無中有有而象物所以出于恍惚之間也此其體也乃謂眞無此之用也乃謂眞有有象斯有物有形斯有性有象物之後而云有精者其眞有生也有生非所以生乃入造化之域居陰陽之境眞性得以感則不化而化正炁得以運則不生而生此之爲生其理幽矣非顯然而著象昭然而成形乃眞于甚眞信于甚信而常以窈冥爲用非達道之士至人之識莫足議此曲則全章第二十二曲則全枉則直窪則盈敝則新少則得多則惑道散于天下得之微者爲精得之寡者爲粗則天下人物於道不能無遠乆高下哉聖人乃得道之具受性之全至于應天下之不一成一己之無窮莫不有措哉亦非以他致之因其理而已且天下之性不能俱直以執我之直而正彼之曲則直不能無損天下之物不能俱美以恃我之盈而不容于衆則盈不能無虧物物相代固有其敝若以自新則敝有時而至事事相雜固有其惑若以徧覽則惑有時而起聖人知其此也順物之理而曲則直矣卑己之性而窪則盈矣日新其德而常以自敝守之以約而不以自惑而後内而處道道無不全外而居政政無不治以己之微而待天下之衆以身之邇而歸四海之遠自非虚以處己寬以待人曷以如此是以聖人抱一爲天下式一者道之初天地之始陰陽未判之前則吾眞無僞萬物未生之先則吾性無分彼我不能以兩適人物不能以互别斯乃至純之化全粹之道推而天下豈可不爲法也不自見故明不自是故彰不白伐故有功不自矜故長夫惟不爭故天下莫能與之爭古之所謂曲則全者豈虛言哉誠全而歸之天下之明明于見人不明于見己明莫大焉非明不足以見己不敢見爾天下之智知于是人不知于是己智莫大焉非智不足以是己不敢是爾以至于功加天下而無不彼其澤能出萬民而莫可及其大自非聖人其明豈不自見而不能曲以全矣其智豈不自是而不能枉以直矣伐其功而盈至于滿假則窪何有也矜其能而新至于光榮則敝何有也如此乃衆人爾聖人反此故又繼之曰夫惟不爭故天下莫能與之爭也希言自然章第二十三希言白然有形者可以理推有言者可以物使或事因于人爲而後成或化因于時作而後起此皆非所以爲自然也惟不可爲而爲不可召而至視之以神而後見聽之以炁而後聞無無以受則化自無來有有以生則變從有出如是則夫何爲哉體于自然而已此所以莫可爲而爲莫之化而化非希而何哉而夷微非不能此而獨言希者舉一隅不以三隅反故也飄風不終朝驟雨不終日天之所以鼔動群生者莫大乎風所以潤澤萬物者莫大乎雨風雨者乃天之所資物之所賴而陰陽感會而後有也陰陽之眞情正而不悖和而不乖乃不愆期而至其來也調其正也常又奚有飄驟之異哉惟其過也或以飄風或以驟雨此陰陽之不常者曷以終朝乎故從事於道者道者同於道德者同於德失者同於失同於道者道亦得之同於德者德亦得之同於失者失亦得之冥于自然寂于無物不以名器求不以形象取而常在于玄玄之化窈窈之中者不道而道不德而德惟其離無以執有捨一而趨二求道之名以爲得道求德之華以爲得德如是得之反以爲失矣欲得道而不同德德而無失莫非處無無之眞界妙妙之玄鄉舉止而不離希矣跂者不立章第二十四跂者不立跨者不行人必有性物必有分性之偏無以全其道分之過無以求其有是故道自性岀性由道入欲身歸無名化體自然必待乎性之沖靜而後可也如欲立者不跂欲行者不跨反以跂而立跨而行必知其不能也形之不完尚艱于行立況性之不完而可立道乎有物混成章第二十五有物混成先天地生寂兮寥兮獨立而不改周行而不殆灝灝在上而寥以無形窈窈居中而恍以無象陰陽隱于一色之内造化藏於不測之際則清濁我以未判天地我以未分而何以謂之有物哉及天地生而萬物出吾道乃散殊于天下以濟其用今以謂有物混成者則老氏欲收天下之散而復歸于一以一之萬而終始無窮往來不匱而萬世無弊哉故云獨立而不改周行而不殆也獨立而不改道所以混而在上以反本周行而不殆道所以混而在下以通變則混成之理於斯二者見之可以爲天下母吾不知其名字之曰道强爲之名曰大大曰逝逝曰遠遠曰反昔一炁充盈于四極而莫知其邊一炁寥廓于六虚而莫知其窮塞乎上而不知其夭徧于下而不知其地此之果如何哉聖人分天地之後生萬物之初而與之字曰道强名曰大則大道之名聖人所以强之也非以體而立歟惟其大也故能涉天下之用無所不往窮四海之物無所不至無所不往所以曰逝無所不至所以曰遠道至于遠則惡以散殊而遠本故反以復初而使終而有始以周行焉此所以遠曰反也故道大天大地大王亦大域中有四大而王居其一焉人法地地法天天法道道法自然天地有至尊而道爲最萬物有成理而道爲奥焉則道也者廓宇宙以至極居三才之至上其大不可以侔焉自一而爲二兩儀設位在上者以高明而至遠處下者以深厚而無疆則覆載之功孰可禦也其大乃得道之一矣二儀既設成位于中以至尊而統萬有以至公而奉大道盡人之倫處王之道亦豈爲小哉此王所以亦大也詳而諭之得道之大者夭得夭之大者地得地之大者王故下繼之曰人法地地法天天法道而道則無所法乃出于自然而已故曰道法自然重爲輕根章第二十六重爲輕根靜爲躁君是以君子終日行不離輜重雖有榮觀燕處超然如何萬乗之主而以身輕天下天地之理萬物之情以固則重重則敦本以寧則靜靜則復性及其紜紜天下之理而變由是生紛紛萬物之情而機由是出變生則萬態俱來而重者以輕機出則情僞交至而靜者以躁浮虚澆薄之患有時而作吉凶悔吝之兆無所不至昔日之重以去其本當時之靜以亂其性如是非以爲善也君子知重爲輕根故行不離輜重知靜爲躁君故雖有榮觀燕處超然則君子輕重躁靜之理亦以敦本而復性矣輕則失臣躁則失君人君貴爲夭子富有四海其勢爲至尊其位爲至高其重固不可以過也若以天下對之以夭下爲衆以一身爲重然以萬乖之尊而身對天下當以夭下爲輕矣善行章第二十七善行無轍迹以車通諸夏以歩陟諸塗其行雖至作所以爲善也聖人體神于至幽藏妙于不測一靜焉與道同居一動焉與道同出至于有行豈有轍迹之可觀乃無而已有轍則運之有滯有迹則通之有塞聖人之行無滯而常運無塞而常通雖至萬世夫何弊哉專于道故矣善言無瑕謫聖人以道處己以道濟物當處己之時寂與神交冥與意會熙熙于妙化之中默默于玄造之内又何以言爲尚也及出而濟物涉于事爲動于心聲示一言以天下爲法宣一教以萬世爲則破庶民之昏昏曉天下之聵聵則言有于不得已也然而言也不以多爲繁不以少爲弊多必盡理滿夭下不以爲非少必守法不及尺編亦以爲當此之爲言豈非善歟定無瑕謫之咎矣反以不善之言出而招辜動而有悔妄則生疵巧而傷仁非止于無瑕謫也亦以爲害爾善計不用籌筭窮域中之變其變無窮盡夭下之數其數無盡竭智必至于疲盡力乃至于耗雖欲計之不可筭矣聖人不然執一以御萬變計身以爲萬物一外無數數至我則以一總之身外無物物來我則以身應之如此則萬變歸于一萬物體于身夭下之數不下堂而知矣又奚以籌筭爲哉自非善計必不能矣善閉無關楗而不可開出而應世以道爲用引天下之未能納天下之未至則當顯然垂諭明然立言開吾之路使人坦然以登闢吾之門俾人趨然以入及退藏于密言不與事交身不與物接寂然以居則神不能見其迹冥然以守則人莫以知其處塞于無路閉于無門絶于外而固其内出于物而入于道無引也未能者無以待無納也未至者無以及雖非關楗其門莫可開而入矣此所謂善閉也善結無繩約而不可解衆人之信有時而失當以約之聖人之信乃爲大矣以己信結天下之信將示于來世垂乎不朽而使萬姓以一言爲據何可解也是以聖人常善救人故無棄人常善救物故無棄物聖人體道道無人物同欲其生共惡其死苟或棄之則人物何所資也是以聖人常善于救人與救物也故善人不善人之師不善人善人之資不貴其師不愛其資雖智大迷是謂要妙人離其性則善不善之分矣以善救不善所以爲師因不善而顯善所以爲資若以道而言之師非貴也資非愛也貴師則有我愛資則有人人我之兩存則分别之心起於道爲患焉又非善也惟其以智爲迷是謂要妙何以智有知則識見於外慮藏于中折有物以爲其辨則眞情亦有時而蔽矣反以如迷萌于無知外不顯于有象内可覺于無物乃道之妙與知其雄章第二十八知其雄守其雌爲天下谿爲天下谿常德不離復歸於嬰兒以陽爲雄以陰爲雌陽則注動陰則注靜則知其雄乃爲動雌乃爲靜也至人以虚處己以寬待人不恃有以爲先常處卑而自下資納于物不以爲盈洞達乎心不以爲我體自然之化而不離于固有歸至純之質而不雜于天眞如此莫不守雌以安靜爲谿而盡性至于常德不離其如嬰兒嬰兒者以取含眞而不吐于外守一而不散于雜設若知雄好動而不守之以雌變性于實而不致之以虚又焉得爲嬰兒乎知其白守其黑爲天下式爲天下式常德不忒復歸于無極白乃未受於五色則所染由時斯色之始也至人愼之以守其黑黑者色成而不可變也然不可變于方則爲北于時則爲冬方至于北則東南自此而起時至于冬則春夏從此而發以此見始起于此終成于此其勢無窮變而大通者也故至人以守之惟其守此則物化之而成事窮之而變萬民規之以爲式夭下體之而爲法其德乃至于無極矣自非守黑曷以臻此知其榮守其辱爲天下谷爲天下谷常德乃足復歸於樸道常惡乎顯以光明性常致于污而卑晦道顯而光則慮不能退藏于密性污而晦則防侈靡以爲患如是則浩以自屈虚以應人知榮爲害道之根我則去之知辱爲成性之本我則守之應彼之來而不費吾之有供彼之去而不竭吾之無裕以有餘優以常足則純而常歸于大樸矣此之成性神而明焉樸散則爲器聖人用之則爲官長形而上者謂之道乃復于樸之時也形而下者謂之器乃樸散爲器之時也故大制不割道制於自然豈有宰割之用乎將欲章第二十九將欲取天下而爲之者吾見其不得已昔帝王之於天下優游閑暇以處于巖廓之中淵默寂靜而安于衽席之上以道治人而衆莫知其有爲以神設化而人莫觀其有作此所謂無爲之世非有以取之也若以爲之而後成作之而後就令然後從不從者戮之功然後賞無功者罰之不庭者必待乎討之而後來不化者必待乎誅之而後向如是非可以樂爲也當不得已而已天下神器不可爲也爲者敗之執者失之故物或行或隨或嘘或吹或强或羸或載或隳以天下爲有則萬弊日出千變叢生物與爲之敵事與爲之患則焦心勞思日以求治不可得也惟其以己忘天下内以無我外以無物無我則風化行于不可見無物則道義示于莫能知禮樂治民之術我將以修身法度爲政之具我用以己萬態爭出我有以不求事物交來我有以不攬此所謂天下神器不可爲之理也至于有爲則敗之有執則失之凡與物競故也物有行隨之不齊行之在前而隨必至于後物有嘘吹之不一嘘之欲温而吹之者已至若强羸之相續載隳之相代此有有而必來者也力與之較智與之謀明與之辨聦與之察雖聖亦以爲耗焉吾何容心哉常無無以待焉是以聖人去甚去奢去泰物有其分事有其常越分爲甚甚而無損損莫大焉過常爲奢奢而無約困莫大焉泰則出乎二者斯非有以補于聖人是以去之以道佐人主章第三十以道佐人主者不以兵强天下其事好還道有體道有用居體之時寥然而不應務澹然而不隨世乃以道自處而樂哉及道之用涉于事爲岀而應務則在德爲德在政爲政在教爲教在化爲化以至修明法度作新典章皆以道佐人主之事惟其佐主以道則服人以德教民以義彼不庭也反以吾仁彼不化也復以吾政又奚以兵强天下哉如是歸之者如水投源來之者若子慕父寧有不還之咎故繼之曰其事好還也師之所處荆棘生焉大軍之後必有凶年故善者果而己不敢以取强果而勿矜果而勿伐果而勿憍果而不得己是果而勿强古之聖人所以用兵者將以輔德而已非以樂爲也出于不得已而後用故黃帝有蚩尤之戰文王有玁狁之討凡以非好于用兵而專求勝于人也要以成其治矣若矜其耀戰之能伐以誇戰之力驕以恃戰之功必見其好勝于用兵而將以爲暴也非果而勿强之理果乃求于成治勿强不以求勝斯蓋知師之所處而地炁所傷大軍之後夭失其和故有凶年天地猶以有傷用兵者寧無損乎斯聖人之一戒耳物壯則老是謂不道不道早已知雄守雌知雄之爲動而吉凶生焉故守靜以常安知白守黑以黑爲北而終以反始則無極焉斯二者乃道之動靜終始而言也若以未判之前眞不爲物雜化不爲情遷不以盛衰干吾之宰不以壯老奪吾之功萬世不弊永永無窮何以此爲累也且物壯則老乃非道爾既爲非道宜其早已夫佳兵章第三十一夫佳兵者不祥之器物或惡之故有道者不處也是以君子居則貴左用兵則貴右兵者不祥之器非君子之器不得已而用之恬惔爲上勝而不美而美之者是樂殺人夫樂殺人者不可得志於天下吉事尚左凶事尚右偏將軍處左上將軍處右言居上勢則以喪禮處之殺人衆多以悲哀泣之戰勝則以喪禮處之殺炁傷和戰心無德師克其萬損我之千況不克而無害乎此宜以爲不祥之器也是以有道者不處有道者以抱一于上以安民于中抱一以無爲爲守則率吾之性爾故優乎游乎而常與道爲同焉安民以制作爲用則演吾之法爾故因焉革焉而常與道爲幾矣二者以用兵爲不祥非樂乎此也苟或不得已而用之以恬惔爲上何耀吾之威以怯彼之勇行吾之兵以遏彼之亂無示于殺人有功于成道利一源以歸眞愼三反而圖勝如此非敢以爲美也苟或美之是樂殺人寧以爲有道道常無名章第三十二道常無名樸雖小天下莫能臣侯王若能守萬物將自賔眞而未散素而未華純無僞以雜其潔固無變以挫其完此所謂樸也道之樸常至于無名道之樸常歸于無象無名也以一言而可得無象也以一念而可求此其所以爲小若出而應天下之變散而充萬象之用有性者以性得有形者以形化天也自此而始萬物由此而母廓然居象帝之先介然在最靈之上如是孰可以臣之若王侯守此萬物將自賔矣域中四大而道與王各居一焉王若能將此樸以御群有則天下之大四海之遠善不勸而遷惡不罰而去以至有目者延頸以求觀有足者跂望而求赴則彼其化者以無外承其德者以有歸小大雲集邇遐影從豈不爲自賔也於道言莫能臣此所謂最上也於萬物言自賔此所謂最尊也最上最尊道固不可以形器求也故曰樸求則得之捨則失之應求而來應捨而去豈非小歟此小非直小也小而大矣故天下莫能臣萬物將自賔也天地相合以降甘露人莫之令而自均大道藏于陰陽陰陽隱于大道天地者得道之陰陽故陽降於下陰升於上其炁相合以成甘露且道之初剖而生其一於五行爲水在人爲命而天地於是有生成之理焉生之者必以成之是以甘露者其化以炁炁之以化則形未有不生者自非陰陽之和以遂其宜莫足語之始制有名名亦既有夫亦將知止知止所以不殆道在物外其樸無名樸散物内以爲形器而名由是生焉有名則有實有實則有數有數則有新敝之相代成壞之相續乃離其樸矣若不知止務名以遍求觀形而博立役精瘁神而無厭足之心竭思勞慮而處憂患之累豈不爲殆也知止則不殆矣譬道之在天下由川谷之於江海人之初生同得于道共有其性日誘月化時將遷矣既以道集性則民之歸也乃復其本奚有不從之患是由川谷之於江海不待其招而來之知人者智章第三十三知人者智自知者明天下之事叢然而難别苟非以知之則僞者以眞天下之物混然而難辨苟非以知之則似者以是至于折萬情而歸正察千變而合宜愚者不敢僭以爲賢賢者不見遺而有棄自非知人何能如此此乃謂之智歟智以知人己之是非或不足以見身之善惡或不足以察將有爲也不可就而就將有行也不可去而去如是雖智未以爲明也如明則見己之是非不昧非以爲是察己之善惡不怙惡以爲善發一言必當于人情措一事必合于衆意内無曲從以求爲阿外無黨舉以求爲諛此乃自知者也又甚于知人所以謂之明勝人者有力自勝者强孟賁之與嬰兒兕虎之與蜂蠆此其爲勝何足較哉出于有力而已是故以大欺小以衆暴寡非足以爲奇也若克己之私遣己之欲利足以自敵害足以自討此乃勝己者也自超于勝人故曰强知足者富性離乎分則所貪無厭道充于己則所求乃足是以至人不徇乎利欲之名罔耽乎浮華之境外物不能誘吾之眞心虚名不能動吾之高意眞以自養道以自充而常足于其内此之爲富乃爲大矣强行者有志騏驥一躍駑馬十駕使騏驥之至千里不以爲有志惟駑馬强力而進勉步而前行而不已而能至者可謂有志矣不失其所者乆眞不以外奪性不以情移乃得其所矣得其所則樂其固有安于自然此所以乆死而不亡者壽有死者必有生有生者必有死自離道而至於民物未嘗有免乎二者也惟内以存乎眞靈中以保乎眞性不著于物而物固無以遷之不散于外而外固無以誘之如此形骸雖腐而我眞全于寂寂名望既在而我性存于杳杳迹雖不見而神常以視口雖不言而炁常以語此乃死而不亡者也其壽爲大大道汎兮章第三十四大道汎兮其可左右周旋動靜無所不居汎應曲當無所不行取之左而右不以爲妨取之右而左不以爲偏小不以爲遺大不以爲懼虚不以爲欠盈不以爲滿凡此乃所謂大道也豈非汎乎萬物恃之以生而不辭功成而不居衣被萬物而不爲主吾道混然未判之前以無無在上純純而樸孰爲天地孰爲萬物莫得以知之及二儀剖判陰陽兩分變通布于四時生長成于萬物則吾道散焉然而昔不以爲無今不以爲有向不以爲大即不以爲小是以萬物生之我則不辭其生無窮功成于衆我則不居其功無已萬物得之則生失之則死華實向背歛藏聚散未有不由乎此也豈非主乎不以爲主者蓋隱藏纖芥不以爲無澹足萬化不以爲有故也常無欲可名於小萬物歸之不知主可名於大道之爲道左右前後出入之不能似以爲實供被廣宇取之無盡似以爲虚實也非有意于小虚也非有意于大小大之名非可以拘以取能小能大故可言之道無欲也至人以欲慮不萌一念而得故名曰小道無方也充塞無外物莫能離故名曰大小止于無欲有欲則應萬物而無窮非以爲小大止于不知主知主與物相對而至于有方非以爲大惟其無欲與不知主乃可名道之小大耳是以聖人能成其大以其不自大故能成其大聖人入與道同居出與道同行其妙也與道同方其虚也與道同體如此則聖人與道豈有二也故能成其大而不自大乃爲大矣執大象章第三十五執大象天下往聖人在下以道自處動容周旋無非道也聖人在上出而應帝王之務顯而爲君師之職身臨四海俾遐邇以向風日覽萬機使群黎而作德豈非執大道以御世也今以謂大象者方將用道以治人吾無所執則政教之具有時而虧法度之柄有時而奪夭下之民無以賴之而往惟執此大象則具有所操柄有所持凡以治民之事皆我所秉耳天下何不往也言象則貴有所執故不言大道而言大象往而不害以道御天下必有德以爲政以仁爲化知厚賦以傷人之財我則薄稅以裕之知重役以疲人之力我則輕徭以寬之賞將勸善我則重之以賜罰將去惡我亦省之而恤如此則往者又何有害也不惟民庶至于草木各遂其生鳥獸各獲其養蠢而昆虫微而魚鼈皆得其所矣此其不害又何害焉安平泰安對危平對側泰對否三者爲言皆致治之意自非聖人之世往而不害曷以共格于此樂與餌過客止道之出口淡乎其無味視之不足見聽之不足聞用之不可既夫人情可以留欲可以治鄭衛之音以悦其情而聽之必美有奇珍之味以甘其口而食之必嘉苟或遇之未有不留者哉可蓋情欲寓于其間故也此樂與餌過客所以止也而道至淡也以其無味至寂也以其不可見不可聞此人乃知之者寡焉至人非此得眞味以忘其餌以餌爲其假聽希音以忘其樂以樂爲其邪是以寥寥乎物上千百載而不爲物之所敝也無他哉屏情塞欲以見其性故能如此將欲歙之章第三十六將欲歙之必固張之將欲弱之必固强之將欲廢之必固興之將欲奪之必固與之是謂微明天地有常理陰陽有正情寒暑往來之相推萬物盛衰之相續以至終而復始窮而反變此乃固然之理而可知者也是以歙張强弱之相伏廢興與奪之相代則歙者在前張乃隨後而至弱者纔行强乃應迹而來廢盡則興奪極則與而皆必來矣而世俗之所共也聖人處道出天地之常權陰陽之正洞達玄情垂乎不測疾徐示于莫可知遲速生于不可見欲以迎之而前忽然在後思以隨之而後忽然在前去焉而反就生焉而復來鬼神莫以窺其迹陰陽無以籠其妙則聖人之道固以盡其變矣此歙之而張弱之而强廢之而興奪之而與乃無定理以拘之此所謂微而明矣微者隱幽而察來知幾而見先洞達物理明徹玄情而有以探于未形矣柔之勝剛弱之勝强性之虚也有以納天下之至變形之無也有以敵天下之至大澹足萬物不以爲有充塞四海不以爲盈其樸雖小而天下莫能臣萬物歸之而不爲其主此道之柔弱孰可勝焉仕道者寧不卑以自處和而自弱不盈以待己常謙以奉人有功而不有有能而不恃不爭焉而天下以爲先不矜焉而天下以爲能此仕道之柔弱亦不可勝矣反以大而屈小高而辱卑求爲剛强以勝柔弱此蓋不知道也魚不可脱於淵國之利器不可以示人魚之爲物伏藏深渺以潜其形則活其身至于明露則禍患來矣聖人體道以御世存神以化人達微明之理以應當時之務示幾先之權而涉事爲之緒變化馳于不可名利用藏于不可測民日遷善不知其然世日躋治不見其迹此蓋利器不示於人故能如此苟機露于當時言宣于民世告以法度之由諭以致治之意非所以爲利器也聖人恥之道常無爲章第三十七道常無爲而無不爲侯王若能守萬物將自化以虚靜爲體以變通爲用其體虚靜歛至無于冥冥收大寂于寞寞則疾徐應對一于自然而未嘗有爲其用變通涉天下而非此不行合萬變而非此不立周旋動容闕此則乖泛應曲當無此則亂以至洪纖短長高下曲直未有不由乎此也此無不爲矣無爲也酬酢萬化之上運乎六合之中寔有爲矣無不爲也皷舞以神不見其跡動止以化不知其用寔無爲矣此道無在無不在之理也侯王守此以御天下無言也而命令宣于四海無動也而教化彰于天下乃無爲而無不爲矣自非體道何以哉化而欲作吾將鎭以無名之樸無名之樸亦將不欲不欲以靜天下將自正人性受沖和之始秉純粹之初天眞保于其中靈源全于其内則所謂抱樸之時及逐情而眞散隨景而靈亡耽嗜慾以適非樂紛華而捨本乃離性失樸矣苟有以救之則反焉是猶天下成化之時其化乆成民將敝矣始于自然終于有作醇以生疵和而適僞天下之風將以移焉何以反之莫非鎭以無名之樸則眞性將復然而聖人抱樸必將以處己非所以救人至于天下欲作之時則情僞已生變態已出夭眞將滅大樸將廢然後鎭之豈吾所欲哉無若靜以自正而求正物焉大道起自無名爲天地之始至于用無名之樸以鎭天下之欲則道乃終矣此太上所以著道經而至此爲末道德眞經解卷中
