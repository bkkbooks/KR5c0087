body:
  text: 道德真經解序談五聖人以神藏寂寞道在杳冥周流六虛而莫足以知其然酬酢萬變孰敢以窺其迹則一往一來而以元自虛一造一化而以真自修又奚有言以好辨哉聖人默而思之輿情至愚必待引之而後動群性至昏必待誨之而後悟此所以有言載于方册垂乎不朽以為常善之救矣洎乎千載厥道彌遠先聖之意昧者不能取至真之言愚者不能達況我老君之書言明而理遠文近而旨幽若不釋而申義衆人視之則有如天之遠而不能炳若丹青矣是致今因行化得屆塵寰不免援毫以彰大義庶幾乎指示而己
