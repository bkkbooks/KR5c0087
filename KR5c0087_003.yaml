body:
  text: 無名氏解上德不德章第三十八上德不德是以有德下德不失德是以無德上德無爲而無以爲下德爲之而有以爲上仁爲之而無以爲上義爲之而有以爲上禮爲之而莫之應則攘臂而仍之故失道而後德失德而後仁失仁而後義失義而後禮夫禮者忠信之薄而亂之首前識者道之華而愚之始是以大丈夫處其厚而不處其薄居其實不居其華故去彼取此上德者天德也聖人觀天默與道會實無所得故曰不德以無所得故德自歸之是以有德也下德者所得之德也下德執德故曰不失德執著之者不名道德是以無德也天德之德德不可至故無爲而無以爲所得之德執著其德故爲之而有以爲德降爲仁若仁則可爲也故上德無爲而上仁爲之然大仁不仁雖曰爲之亦無以爲而幾於上德者焉義兼於德而義則可以虧也故下德爲之而上義亦爲焉然内以立我未能忘我外以制事未能無事雖曰上義猶未免於有所執也故有以爲而類於下德者焉道降德衰仁義俱失以禮交物實相僞也故爲而生患莫之應則攘臂而仍之即此以觀其所失每下可知已故曰失道而後德失德而後仁失仁而後義失義而後禮上禮爲之而莫之應則忠信之薄也攘臂而仍之則亂之首也然德兼上下而兩言自仁而降言上而不言下則其下者已不足道也至於以智爲前識復不言其上是尤不及於禮矣窮思極慮揣而銳之故曰道之華苦心勞神以喪天眞故曰愚之始不言失禮而後智則以禮者亂乎德而智者反乎道也是以大丈夫處德之厚不處禮之薄居道之實不居智之華故去彼人道之華而取此仙道之實矣昔之得一章第三十九昔之得一者天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯玉得一以爲天下正其致之一也天無以清將恐裂地無以寧將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐滅侯王無以爲正而貴高將恐蹶故貴以賤爲本高以下爲基是以侯王自稱孤寡不穀此其以賤爲本邪非乎故致數輿無輿不欲琭琭如玉落落如石一者道也有一未形本無所得渾淪既判肇自古初則物得之天確然闢乎上以無爲用故得道而清地隤然處乎下以靜爲體故得道而寜神杳然藏乎幽陰陽不測故得道而靈谷虚而窪夭道也以夭得道而清故谷得道而盈物止而育地道也以地得道而寧故物得道而生神舍於身百體之侯王也神尸諸聖天下之侯王也以神得道而靈故侯王得道以爲天下正其致此者道而已若夭失其清斯無以覆將恐裂矣地失其寜斯無以載將恐發矣神失其靈斯無以守將恐歇矣謂天無以清也故谷失其盈而將恐竭謂地無以寧也故物失其生而將恐滅謂神失其靈也故侯王失其正而將恐蹶且賤歸之則顯其貴下附之則顯其高亦猶丘山積卑而爲高江海合水而爲大大人合并而爲公故貴高者不可失於基本也是以侯王處一於域中故自稱以孤寡食氣於太和故自稱以不穀有百體然後身之侯王以貴有百姓然後天下之侯王以尊侯王得此而擅貴高之稱者豈非以賤爲本故邪夫致數輿者近取諸譬也今以轅軌輪輻合而成輿若立輿於前數其衆體用有所拘不足以得輿也合轅軌輪輻然後輿有運載之名合百姓賤下然後侯王有貴高之稱玉者貴也石者賤也玉出於石則貴亦以賤爲本然玉者有質而自貴侯王得一本不自貴豈欲如玉石然哉反者道之動章第四十反者道之動弱者道之用天下之物生於有有生於無靜者地道也反地道之靜而爲動是陰之感乎陽者也故曰反者道之動弱者天道也由天道之弱而爲用是陽之感乎陰者也故曰弱者道之用陽以無爲用陰以有爲體陰陽交感於太空之中而物生焉萬物由地道而生故曰天下之物生於有此乃反者道之動歟然有形者非天道不足爲生故曰有生於無此乃弱者道之用歟是以聖人言有以無爲母無以虚爲母虚以道爲母自然者道之根本也若能存守玄都法其自然則由動之靜攝用歸體將復於道矣上士聞道章第四十一上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以爲道故建言有之明道若昧進道若退夷道若纇上德若谷大白若辱廣德若不足建德若偷質眞若渝大方無隅大器晚成大音希聲大象無形道隱無名夫惟道善貸且成上士既已明道也故信之篤守之固有聞必力行之中士將以進道也勉而後中不勉則不中思而後得不思則不得一出焉一入焉聞之猶有疑心也故存亡之間未之或行下士直以夷道也譬猶俚耳不知大聲譬猶衆心不受高言及其聞道必有輕鄙之心焉故與道大反嗑然而笑之若道不見笑於下士其異於俚耳之所聞衆口之所說幾希安足以爲道哉故建言有之明道若昩惟蚤夜以存思定適而默想勤行乎道則得矣進道若退以日計之不足歲計之有餘於存亡無累則可矣夷道若纇且泥形色名聲之可得耳目鼻口之所嗜人笑乎道則過矣亦知四大之在域中猶不外於道者乎上德者天道也天道窪則盈以其窪也故若谷大白者王道也王道弊則新以其弊也故若辱廣德以地道言之用之不弊而成之若缺故若不足建德以大道言之建之不拔而修之罔覺故若偷以其若谷若辱若不足若偷則疑於變其質矣然其爲上德爲大白爲廣德爲建德而眞常之質固自若也此之謂質眞若渝所以質眞若渝者何謂大方無隅大器晚成大音希聲大象無形也大方載之德合無彊故無隅大器用之乆於其道故晚成大音不言而四時行焉故希聲也大象不物天下往焉故無形也此四大之所以大者夫德兼於道道兼於天帝王之德配天地之道而無名者天地之始也道於之而隱焉若分四大於域中皆其顯道而强名之者矣道本非善貸由天地帝王體此道以成天下故善貸之名於是乎立而曲成之效於是乎著然其成也且而已豈有心於勸成而然哉道生一章第四十二道生一一生二二生三三生萬物萬物負陰而抱陽冲氣以爲和人之所惡唯孤寡不穀而玉公以爲稱故物或損之而益益之而損人之所教亦我義教之强梁者不得其死吾將以爲教父易變而爲一一之所以起也故曰道生一一者形變之始天地有形之最大也故曰一生二天地定位人居乎中而三才成焉故曰二生三輕清者上爲夭重濁者下爲地冲和氣者爲人然後天地含精萬物化生故曰三生萬物夭爲陽而肅肅出乎天則陰上交乎陽而物負之地爲陰而赫赫發乎地則陽下交乎陰而物抱之陰陽升降兩者交通然後冲和之氣以成也故曰萬物負陰而抱陽冲氣以爲和人之一身貌肖天地陰陽冲氣皆具其中其必有至神者典之亦猶王公之於天下也於此配域中之大是爲孤寡於此食太和之氣是爲不穀世之人與神背馳反以爲惡而王公獨以此自任故曰人之所惡唯孤寡不穀而王公以爲稱陰陽冲和之氣通於萬物固無所損益也由天地盈虚與時消息則或益之而損損之而益矣人之所教必以天地之正也我好靜而民自正是我亦義教之此謂損之而益强梁者反此矣故不得其死此謂益之而損聖人觀之因以爲戒故將以爲教父天下之至柔章第四十三天下之至柔馳騁天下之至堅無有入於無間是以知無爲之有益不言之教無爲之益天下希及之至柔者神也至堅者形也眞神通於道能亡能存惟以神御形則神能飛形而形由之以馳騁矣故曰天下之至柔馳騁夭下之至堅至柔故無有至堅故無間以形御形則形有所間故無間者不可入以神御形則神有所通亦無入而不自得矣故曰無有入於無間夫形之所化者不言之教也神之所得者無爲之益也若能體天地之道處無爲之事行不言之教則造乎形而與乎神形神俱妙與道合眞矣夭下尚言教而好有爲故於此希及之名與身章第四十四名與身孰親身與貨孰多得與亡孰病是故甚愛必大費多藏必厚亡知足不辱知止不殆可以長乆貴者夜以繼日思慮善否其爲形也亦疏矣是以身殉名之過也烏覩所親者在身不在名耶富者苦身疾作多積財而不得盡用其爲形也亦外矣以身殉利之過也烏覩所多者在身不在貨也然榮辱立而覩所病貨財聚而覩所爭彼以顯爲是者知名之爲榮以富爲是者知貨之爲利故見得而忘其形見利而忘其眞然則得之與亡其果孰病乎是其所亡者乃無名之樸不貲之軀也病孰甚於此矣故甚愛於名而不知止則其大者必費大者道之稱所謂無名之樸是已多藏其貨而不知足則其厚者必亡厚者德之質所謂不貲之軀是已唯聖人體廣德之知足而不自貴其貨所以不辱體上德之知止而不自尊其名所以不殆若是者可以長乆與夭地並焉大成若缺章第四十五大成若缺其用不弊大盈若冲其用不窮大眞若屈大巧若拙大辯若訥躁勝寒靜勝熱清靜爲天下正大成者地之德廣德若不足故雖成而若缺大盈者天之德上德不自得故雖盈而若沖成若爲山其積必壞非大成也大成若缺無時而壞故其用不弊盈若積水其施必竭非大盈也大盈若冲無時而竭故其用不窮此二者夭地之用陰陽是也夭能生之無時不生而所生之用不窮地能化之無時不化而所化之用不弊則以道實行乎其中也唯通之爲三故舉夭地則道可知若分而言之則大直若屈者地道也地道直而不肆故若拙大巧若拙者常道也常道刻彫衆形而不爲巧故若拙大辯若訥者天道也天道不言而善應故若訥然論其宗天地雖大不離陰陽而一陰一陽者道也故積陽爲天積陰爲地陰靜陽躁陽熱陰寒制陰者陽故躁可勝寒制陽者陰故靜可勝熱然寒往則暑來暑往則寒來其用何窮何弊之有哉夫道有清有濁有動有靜清者濁之源靜者動之基人能常清靜夭地悉皆歸而況於物乎況於事倫乎故曰清淨爲夭下正天下有道章第四十六天下有道郤走馬以糞天下無道戎馬生於郊罪莫大於可欲禍莫大於不知足咎莫大於欲得故知足之足常足矣以道蒞夭下者常使民無知無欲故人各安其所而不爭糞其田疇而已及其下衰世無以興乎道則見可欲而不知足於是有欲得之心乃始攘奪矯虔馮陵疆土而戎馬生於郊也反觀諸身即在我之天下故有道於身則安其分量以厚吾寸田之守失道於身則馳騁田獵令心發狂而方寸之田已失矣故罪莫大於可欲禍莫大於不知足咎莫大於欲得皆不安其分量之過也其已甚則爭奪隨之若能安其性命之分還身意所欲清淨而自守則取足於身而得矣夫豈有不足哉此知足之足所以常足不岀户章第四十七不岀户知天下不窺牖見天道其出彌遠其知彌少是以聖人不行而知不見而名不爲而成天下者九州山川河海滋生不絶也天道者四時陰陽風雨變化無窮也反觀諸身無不圓成是以聖人言吾與夭地分一氣而治苟解乎此亦不必出户窺牖而夭地之道可知見矣若求道於身外則愈不足以得道是其出彌遠而其知彌少也豈知一身之中萬理咸備近取諸此無不充足者乎是以聖人體地之道以虚爲身故不行而知無俟出户體夭之道以無爲心故不見而名無俟窺牖體夫大道以自然爲常故不爲而成亦無俟進智力於所見所行之時也爲學日益章第四十八爲學日益爲道日損損之又損以至於無爲而無不爲故取天下常以無事及其有事不足以取天下爲學者將以窮理故日益爲道者將以盡性故日損損之又損則盡性以至於命者也理有所窮性有所盡猶未免於爲故言爲學爲道惟命有所至則歸根曰靜靜曰復命以至於無爲矣無爲者寂然不動之時也然感而遂通天下之故則亦有爲矣故無爲而無不爲一有所爲未免有累物之行一無所爲未免有絶物之心聖人於夭下何如哉亦處無爲之事而已處無爲之事乃可以取夭下故取天下者常以無事也然天下神器不可爲也爲者敗之執者失之及其有事亦不足以取夭下矣知夭下不可以有事取則要當學其所不學以至無爲之道聖人無常心章第四十九聖人無常心以百姓心爲心善者吾善之不善者吾亦善之德善信者吾信之不信者吾亦信之德信聖人在天下惵惵爲天下渾其心百姓皆注其耳目聖人皆孩之聖人欲歸初始反於未生故無常心善惡信誕惟人之所爲我無容心焉亦因人之心以爲心而已百姓行善者我不知也百姓行惡者我不知也積善善氣至我不知其爲善故善者吾善之積惡惡氣至我不知其爲不善故不善者吾亦善之信與不信亦猶是也任之自然吾無容僞於其間是謂德善德信矣以如此則齊善否同信誕而吾心無所偏係故惵惵爲天下渾其心百姓常有心也以徇聲色之娛故皆注其耳目不知收視反聽守母之道唯聖人常無心也懐天下之始復守天下之母故皆孩之岀生入死章第五十出生入死生之徒十有三死之徒十有三人之生動之死地亦十有三夫何故以其生生之厚蓋聞善攝生者陸行不遇兕虎入軍不被甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地萬物出於天地之機曰生入於陰陽之變曰死與生死爲徒者未脱乎天地之機未免乎陰陽之變者也然萬物出生入死而獨云人之生動之死地亦十有三者何也此皆民自令耳非天地毁鬼神害也以其有知而形動故也目覩生之來不能却死之去不能止何故以其生生之厚而動之死地也夫惟聖人懷微妙抱質樸而不敢有爲與天下交爭焉雖有猛獸不能據也雖有兵刃不能害也蓋其積德玄通物莫之能傷者故無死地焉道生之章第五十一道生之德畜之物形之勢成之是以萬物莫不尊道而貴德道之尊德之貴夫莫之爵而常自然故道生之畜之長之育之成之熟之養之覆之生而不有爲而不恃長而不宰是謂玄德道何自而生邪畜道眞和之氣萬物由而生之道之所以生也故曰道生之德畜之物何自而形耶縁天地升降陰陽之勢萬物由而成之物之所以形也故曰物形之勢成之以道能生故物莫不首之夫是之謂尊道以德能畜故物莫能賤之夫是之謂貴德唯道與德寓於積陽之上非期尊貴於物物自尊貴之以其自古及今莫之爵而常自然故道生之畜之長之育之成之熟之養之覆之此道行乎天地之間而常自然者也若夫生而不有爲而不恃長而不宰則天地之所同也故是謂玄德天下有始章第五十二天下有始以爲天下母既得其母以知其子既知其子復守其母没身不殆塞其兊閉其門終身不勤開其兊濟其事終身不救見小曰明守柔曰强用其光復歸其明無遺身殃是謂襲常一生天地然後天下有始故以爲天下母既得天地爲天下母乃知萬物皆爲子也既知其子而復守其母則其子全矣蓋人徒知天地萬物而不自知其所由生若能知之而復守天地之道則終身不殆矣是以體天地之道者處無爲之事行不言之教故曰塞其兊閉其門終身不勤不知道者多言有爲以從事於務而失守母之道故曰開其兊濟其事終身不救夫小者天地之樸柔者道之妙用唯自知而見天地之道故曰明唯自勝而守天道之妙故曰强明者合陰陽而言之光出於明以無爲用在己則智意是已聖人去智與故不由而照之于天故用其光復歸其明光耀於外謂之遺殃無遺身殃而復歸於明是謂襲常矣如此然後可以爲守母之道使我介然章第五十三使我介然有知行於大道唯施是畏大道甚夷民甚好徑朝甚除田甚蕪倉甚虚服文綵帶利劍厭飲食財貨有餘是謂盜誇非道也哉夫山徑之谿介然用之則成路爲間不用則茅塞之矣世之人不知大道之妙而施作有爲所以致茅塞其心夫性之動謂之爲爲之僞謂之失是以有知者畏而不敢施爲也大道甚夷視之而不見也民心欲速是以好逕而終迷於大道且心爲君主之官故心有所攖則寸田失守寸田失守則和氣不降和氣不降則大倉虚矣故曰朝甚除田甚蕪倉甚虚以其如是則分高下之品有爭奪之奇貪五味之爽故服文綵帶利劍厭飲食者有之資財有餘則總其害之原也是謂賊道賊身之務而不知者尚矜誇己之才能而不已可謂盜誇非道也哉善建不拔章第五十四善建者不拔善抱者不脱子孫以祭祀不輟修之身其德乃眞修之家其德乃餘修之鄉其德乃長修之國其德乃豐修之天下其德乃普故以身觀身以家觀家以鄉觀鄉以國觀國以天下觀天下吾何以知天下之然哉以此建者造始有爲者也唯道建德判立天地巍巍乎其不拔此分一氣而爲兩儀之時也抱者即而不離者也唯德抱道生成萬物綿綿乎其不脱此散一氣而成庶類之時也物同得於一氣唯人爲最靈故能之萬物之祖天地之原於此建中抱一以爲天下則垂之後世子孫四海之内各以其職來祭不輟矣是道也吾原其始蓋本於修之身而已道之眞既以治身則其緒餘以爲國家其土苴以爲天下由一身而及乎天下則其修彌廣其德彌進矣修之身者神雖在身先隱天地靜居萬物之始令意莫在身此所謂修之身則其德乃眞矣由此推之人雖在家令意莫在家此所謂修之家則其德乃餘矣人雖在鄉令意莫在鄉此所謂修之鄉則其德乃長矣人雖在國令意莫在國此所謂修之國則其德乃豐矣人雖在天下令意莫在天下此所謂修之天下則其德乃普矣故以身觀身者内視密眄而觀己之德也夫一家一鄉一國以至天下之觀者聖人無容心焉各以其自觀之故得自然也吾何以知天下之然哉以此含德之厚章第五十五含德之厚比於赤子毒虫不螫猛獸不據攫鳥不搏骨弱筋柔而握固未知牝牡之合而䘒作精之至也終曰號而嗌不嗄和之至知和曰常知常曰明益生曰祥心使氣曰强物壯則老是謂不道不道早己赤子之性與道爲一其天守全其神無隙是以大人不失赤子之心而含德之厚可以比於赤子若是者積德玄通藏於天而物莫之能傷也故毒蟲不螫猛獸不據攫鳥不搏骨弱筋柔而握固者德全於地道也地之氣始於子赤子骨弱筋柔而能握固者是純氣之守應於地道也未知牡牝之合而䘒作精之至者德全於常道也常然之道其精甚眞赤子未知牡牝之合而時有䘒作者是道之眞精應於人也終日號而嗌不嗄和之至者德全於天道也天主聲以其陰陽之氣和而未分故終日號而嗌不嗄也知和者陰陽混而爲一故曰常知常者陰陽合而未分故曰明赤子之性與天地合其德不以生爲益反爲益生者動之死地之兆是謂祥矣既以生爲益則必以心使氣是謂堅强之徒也始於益生致於物壯則老是謂不道不道早已知者不言章第五十六知者不言言者不知塞其兊閉其門挫其銳解其紛和其光同其塵是謂玄同故不可得而親不可得而疏不可得而利不可得而害不可得而貴不可得而賤故爲天下貴道要自然行者能得聞者能言所以言者以言相然相然者意之默識而已未嘗見於譸譊之言辨也故曰知者不言不知道者以言相煩不聞不言不知所由然故曰言者不知唯聖人知天地之道有大美而不言故塞其兊閉其門塗郤守神而退藏於密及其出而爲天下於此體天之道則挫其銳而和其光也於此體地之道則解紛而同其塵也天地之道是謂玄同玄有赤有黑故玄同則合乎至一而與天地相參天道無親故不可得而親既不可得而親亦不可得而疏也地道無欲故不可得而利既不可得而利亦不可得而害也大道無形故不可得而貴既不可得而貴亦不可得而賤也若是者宜爲天下貴以正治國章第五十七以正治國以奇用兵以無事取天下吾何以知其然哉夫天下多忌諱而民彌貧人多利器國家滋昏人多伎巧奇物滋起法令滋彰盜賊多有故聖人云我無爲而民自化我無事而民自富我好靜而民自正我無欲而民自樸聞在宥天下不聞治天下天下不可治也故以正治國者必以奇用兵蓋正復爲奇則有用兵之患以福兮禍所伏也孰知其極是以聖人以無事取天下無事則法地而好靜好靜則法天而無爲無爲則法道而無欲無欲則天下自然歸之吾何以知其然哉夫治出於有爲而失太上不言之教故多忌諱之禁則四民遷業而彌貧民貧則征求利器貪污之風生故國家滋昏玩好伎巧難得之貨貴故奇物滋起由此利害相攻法令滋彰尅核大至民不聊生故盜賊多有奇兵之用縁此而起此乃以正治國正之極也是以聖人無事則國實民富故忌諱不生好靜則天下自正故利器不作無爲則萬民自化伎巧何施無欲則民自歸樸盜賊何有此乃以無事取天下也其政悶悶章第五十八其政悶悶其民淳淳其政察察其民缺缺禍兮福所倚福兮禍所伏孰知其極其無正邪正復爲奇善復爲祅民之迷其日固乆是以聖人方而不割廉而不劌直而不肆光而不耀太上之世處無爲之事行不言之教天下知有上而不知有政故爲政無處正自居之悶悶者有政而不作也有政不作則非以明民將以愚之故其民亦淳淳而若樸焉然既立政爲正必有以察爲奇故始於悶悶而終於察察終於察察政之極也其政太察使民無所措手足故其民缺缺焉聖人言但知求福不知罪嬰但知養身不知戮形禍福倚伏理之然也故曰孰知其極其無正邪世之人以政爲正不知正之極而奇生以福爲善不知善之復而妖起迷迷相傳于今乆矣是以聖人方如廣德之厚故不割也廉如上德之清故不劌也直而不申於外光而返照於内無正可處無奇可察是謂無極之道治人事天章第五十九治人事天莫若嗇夫唯嗇是謂早復早復謂之重積德重積德則無不克無不克則莫知其極莫知其極可以有國有國之母可以長乆是謂深根固蔕長生乆視之道嗇者斂也畜也歸之於德也以外言之曰歛以内言之曰畜斂於外者至於無欲故後其身外其身所以治人也畜於内者至於無知故存其心養其性所以事天也外則無欲法地之靜而得以盡性内則無知體天之用而至於復命盡性而至於復命是乃復守其母故謂之早復焉早者日升於甲陽之首也復守其母則與天地合其德是之謂重積德積德玄通與道合眞則無不克與道合眞者難終難窮故莫知其極難終難窮者萬理咸備故可以有國有國之母者道也不方不圓與天地並故可以長乆始於守母是謂深其根終於復命是謂固其蔕得天地爲常而五行不相克與大道爲一而三光無明冥是謂長生乆視之道治大國章第六十治大國若烹小鮮以道蒞天下其鬼不神非其鬼不神其神不傷民非其神不傷民聖人亦不傷民夫兩不相傷故德交歸焉治道貴清淨而民自定不可施爲也故治大國者若烹小鮮自人言之則大國者乃天中地户黄帝之鄉所以治之亦若此而已是以聖人處無爲之事一心定而王天下故鬼無所出其靈響依人而行何神之有哉非其鬼不神也以其不受於邪邪氣自去是神亦不傷於人也非其神不傷於人也以其聖人處無爲之事而天下化成使民外則無爭奪攻戰之患内則無圖爲殺怨之心不犯神之報應是乃聖人亦不傷人矣人與鬼神兩不相傷則神之予矣貽爾多福而歸德於神也民之質矣日用飲食而德歸於人也德歸於神故子孫以祭祀不輟德歸於人故天下樂推而不厭此乃聖人以道范天下之效大國者下流章第六十一大國者下流天下之交天下之牝牝常以靜勝牡以靜爲下故大國以下小國則取小國小國以下大國則取大國故或下以取或下而取大國不過欲兼畜人小國不過欲入事人兩者各得其所欲故大者宜爲下水以善下故江海能爲百谷王大國欲兼畜人亦以其下流而已故曰大國者下流天下交萬物生人道交功勛成是謂天下之交然必自處以柔靜而後可牝常以靜勝牡而牡歸之者以靜爲下也靜則無事唯無事可以取天下而況於國乎故大國以下小國則取小國小國以下大國則取大國或下以取者君道也或下而取者臣道也君猶天也天道下濟而光明故大國不過欲兼畜人臣猶地也地道卑而上行故小國不過欲入事人至於天地交而萬物生人道交而功勛成則兩者各得其所欲然宜下流者唯大國而已故又曰大者宜爲下道者萬物之奥章第六十二道者萬物之奥善人之寳不善人之所保美言可以市尊行可以加人人之不善何棄之有故立天子置三公雖有拱璧以先駟馬不如坐進此道古之所以貴此道者何也不曰求以得有罪以免邪故爲天下貴道者虚無之淵人皆見物而不見乎道則以道爲萬物之奥故也得道之妙則爲善是謂性命之寳得道之言則爲不善然亦於道有所保焉市者衆人之所歸加者置諸衆人之上美言尊行人之不善於道者亦足以得衆而人上之夫何棄之有故立天子置三公坐而論道者也有拱璧以先駟馬則美言尊行得衆而人上之如此雖如此亦不如坐進無爲之道得其妙之爲愈也古之所以貴此道者何也不曰性命之寳求則得之而生之所保特有罪以免耶故爲天下貴爲無爲章第六十三爲無爲事無事味無味大小多少報怨以德圖難於其易爲大於其細天下之難事必作於易天下大事必作於細是以聖人終不爲大故能成其大夫輕諾必寡信多易必多難是以聖人猶難之故終無難矣聖人體天道以行不言之教故爲無爲體常道以處無爲之事故事無事體地道而樂恬淡之能故味無味自其所應者言之若有爲有事有味也自其所守者言之則其爲者無爲其事者無事其味者無味而已世之人不通乎此故勇動多怨縁小而至大縁少而至多唯有心於事爲嗜慾之間也然大小多少縁類而報皆出於自得天地應之如谷故曰報怨以德由此觀之天下之難事縁作於易而至於難也天下之大事縁作於細而至於大也故患生不意禍生絲微此之謂歟是以聖人以天合天故終不爲大與道爲一故能成其大且輕諾多易者傷輕易於有爲也故寡信而多難矣聖人行不言之教故無寡信之行處無爲之事樂恬淡之能故無多難之尤任其自然而不敢爲故終無難矣其安易持章第六十四其安易持其未兆易謀其脆易泮其微易散爲之於未有治之於未亂合抱之木生於毫末九層之臺起於累土千里之行始於足下爲者敗之執者失之是以聖人無爲故無敗無執故無失故民之從事常於幾成而敗之愼終如始則無敗事矣是以聖人欲不欲不貴難得之貨學不學以復衆人之所過以輔萬物之自然而不敢爲安靜未萌易爲持謀所謂爲之於未有也脆微已作易爲泮散所謂治之於未亂也然爲之於未有者能無思慮乎治之於未亂者能無智謀乎故聖人言謀思危之首危者將不乆不若戒事物之先而忘其爲戒事物之始而忘其治之爲愈也夫大生於小高生於下遠生於近理之然也爲者敗之執者失之唯聖人見端而思末覩㫖而知歸是以無爲也故無敗無執也故無失若夫民之從事未免於有爲有治而不知愼戒所欲浸長眞和乃盡故幾成而敗之豈不然哉若能愼終如始反嬰兒守母之道則無敗事矣故聖人欲不欲外無所爲雖難得之貨不足貴也學不學内無以爲雖美言尊行不足尚也以復衆人爲治之所過以輔萬物之自然而不敢爲古之善爲道章第六十五古之善爲道者非以明民將以愚之民之難治以其智多故以智治國國之賊不以智治國國之福知此兩者亦楷式常知楷式是謂玄德玄德深矣遠矣與物反矣然後乃至大順道無爲則自得於内道無不爲則化成於外是以古之善爲道者非以明民將以愚之明則澆淳而亂愚則守樸而靜且民可使由之不可使知之民之難治以其智多而有知也智者爭之器故以智治國者國之賊非以其明之耶不以智治國者國之福非以其愚之邪國之賊則開人者賊生也國之福則開天者德生也此兩者亦楷式可則而像之能知楷式然後可以觀於天故是謂玄德玄德者上德也故深矣遠矣物無得而偶之者惟同乎大順而已故與物反矣然後乃至大順江海爲百谷王章第六十六江海所以能爲百谷王者以其善下之故能爲百谷王是以聖人欲上人以其言下之欲先人以其身後之是以聖人處上而人不重處前而人不害是以天下樂推而不厭以其不爭故天下莫能與之爭江海以其善下故取百谷之流而爲王矣王有歸往之義故以貴下賤大得民也是以聖人體天之道而以言下之則處上而人不重故從之也輕體地之道而以身後之則處前而人不害故利之者博若此則自西自東自南自北無思不服故天下樂推而不厭也要其所以然者亦不過善下而已唯善下者不與物爭故天下莫能與之爭天下皆謂章第六十七天下皆謂我道大似不肖夫惟大故似不肖若肖乆矣其細也夫我有三寳寳而持之一曰慈二曰儉三曰不敢爲天下先夫慈故能勇儉故能廣不敢爲天下先故能成器長今捨其慈且勇捨其儉且廣捨其後且先死矣夫慈以戰則勝以守則固天將救之以慈衛之肖物者小爲物所肖者大夫道包裹天地充滿六極洋洋乎大哉故似不肖天大地大肖道而已故能乆然天地空中之一細物其於道亦細也夫是以我有三寳寳而持之一曰慈者父道也造物之主言天也二曰儉者母道也畜歛之主言地也三曰不敢爲天下先者天地之原也感而後應不爲物先言道也天地道兼而用之則澹然無極而衆美從三寳無出於此者凡人皆有是當在寳而勿失持之爲上夫天道生之覆之是所謂慈雖慈也然不爭而善勝是慈故能勇地道畜之育之是所謂儉雖儉也然德合於無疆是儉故能廣唯大道總乎天地之原雖不敢爲天下先然生化之字待是而立故能成器長若夫逆天地而捨大道者則死矣夫慈以戰則勝者以陽戰陰也以守則固者抱玄之道也且以順戰逆待時而動則援之而勝矣不可動則守以順天時亦衛之而固矣故天將救之以慈衛之善爲士章第六十八善爲士者不武善戰者不怒善勝敵者不爭善用人者爲之下是謂不爭之德是謂用人之力是謂配天古之極善爲士者懷三寳之道不以兵强天下而用武也于以戰人是爲善戰于以胜敵是爲善勝于以用人是爲善用善戰者待時而後動雖戰而不怒體慈之寳也善勝者慮勝而後會雖勝而不爭體儉之寳也善用人者智不自慮而悦以使人故人樂爲之用體不敢爲天下先之寳也善於此者是謂不爭之德是謂用人之力是謂配天也然古之爲正正復爲奇乃有用兵之戒故曰古之極孰知其極也夫用兵有言章第六十九用兵有言吾不敢爲主而爲客不敢進寸而退尺是謂行無行攘無臂仍無敵執無兵禍莫大於輕敵輕敵幾喪吾寳故抗兵相加則哀者勝矣用兵有言者明其言非我有也乃用兵者之常言也吾不敢爲主而爲客則迫而後動不得已而後起未嘗感人也應之而已既不得已則非踴躍用兵而以樂殺人爲事者是以不敢進寸而退尺故曰行無行也攘無臂者善戰而不怒也仍無敵者善勝敵而不爭也執無兵者善用人而爲之下也此乃深得三寳之道者然三寳非獨論兵而已奈何古之極遂至於用兵也兵乃凶器不可輕敵輕敵者是樂殺人也捨其慈且勇捨其儉且廣捨其後且先故幾喪吾寳是以抗兵相加則哀憐者慈也以慈爲寳則無輕敵之禍故勝也吾言甚易知章第七十吾言甚易知甚易行天下莫能知莫能行言有宗事有君夫惟無知是以不吾知也知我者希則我者貴矣是以聖人被褐懷玉無思無慮始知道故易知也無從無道始得道故易行也而天下富貴者侈欲以喪眞貧賤者勞役以傷生皆喪己於物失性於俗故莫能知莫能行矣夫言有宗者明一章之言其統之有宗也此之謂易知者歟事有君者明一章之事其主之有君也此之謂易行者歟不失其宗與君何患不能知不能行哉故聖人言子若行吾道當知上慧原智亦不獨生皆須對因縁若無行宿本是謂無知惡能明太上玄妙之理此所以不吾知也有不言而知者見非於衆有不學而得者見異於俗故知道者稀足見得見者貴也是以聖人薄於外而厚於内不衒鬻於人懷崑山之玉而莫能知者知不知章第七十一知不知尚矣不知知病矣夫惟病病是以不病聖人之不病以其病病是以不病道本無知也以無思無慮而知道矣故曰知不知是謂眞知能知不知之知者其知尚矣不知不知之道而昭然有知者高談妙論以究本窮元其知病矣唯知知病爲病而忘其知者是以不病也聖人何其不病也以其知知病爲病而常若不知矣是以不病也民不畏威章第七十二民不畏威則大威至矣無狹其所居無厭其所生夫惟不厭是以不厭是以聖人自知不自見自愛不自貴故去彼取此怒而威其威也小不怒而威其威也大聖人不以威屈天下使民無畏威之容而有畏德之心則不怒之威默加乎人是謂大威至矣化民使得盡其性則擴而充之所居無狹育而成之所生無厭此乃聖人所以體夫天地道者也體天大威而不怒體地廣居而不狹體道生生而不厭惟上不厭民之所生則民亦得盡其性而不厭矣是以聖人不自見故明矣惟明所以自知而體天地也不自貴故德矣惟德所以自愛而法大道也故去彼自見自貴而取此天地道者焉勇於敢則殺章第七十三勇於敢則殺勇於不敢則活此兩者或利或害天之所惡孰知其故是以聖人猶難之天之道不爭而善勝不言而善應不召而自來坦然而善謀天網恢恢疏而不失勇於敢爲而以身先天下者是謂逆天道也故殺矣勇於不敢爲天下先者是謂體天道也故活矣然勇於不敢者於生之利而於俗之害勇於敢者於俗之利而於生之害在世俗觀之不能無疑故惑之也若夫天之所惡敦得而知其故哉且天道虧盈而益謙故順天者存逆天者亡是以聖人猶難之而不敢爲也夫天之道本無所爲萬物之出與之出而不辭萬物之歸與之歸而不拒物之多皆所受命於此是謂不爭而善勝也四時行焉百物生焉固不言而善應也善者福之淫者禍之固不召而自來也示人以易知應物以多變固坦然而善謀也天網恢恢疏而不失其以此歟民常不畏章第七十四民常不畏死奈何以死懼之若使民常畏死而爲奇者吾得執而殺之孰敢常有司殺者殺夫代司殺者殺是代大匠斲夫代大匠斲希有不傷其手矣民得其性則常樂其生苟失其性則死亦何畏哉雖爲苛法以死懼之民亦將抵冒而終莫能化也若使民常畏死是致民得其性而知生之樂故重犯法也有爲奇者吾得執而殺之又敦敢爲哉常有司殺者殺是謂有德司契也使民常畏死而爲奇者吾得執而殺之矣夫代司殺者殺是謂無德司徹也民常不畏死而以死懼之豈不謂代大匠斲耶斲物之大匠者造物之主也造物之主者天道無爲也逆天制物者有爲也希有不自傷者也民之饑章第七十五民之饑以其上食稅之多也是以饑民之難治以其上之有爲也是以難治民之輕死以其生生之厚也是以輕死夫唯無以生爲者是賢於貴生也王者以民爲天而民以食爲天聖人之治省刑罰薄稅斂知天之天然後民可得而保也食稅之多以其賦重而不知薄稅斂以養之故民之所以饑上之有爲以其政煩而不知省刑罰以安之故民之所以難治凡人之情興於富庶然後有恒心還於淳樸然後無他欲至於饑而難治則不安其分量而欲利之愈勤是以於生太厚而動之死地者有之故人之所以輕死也唯得道之人寸田内守而和氣自降形精不虧而天守自全若是者達生之情不務生之所無以爲是賢於貴生也異於生生之厚而輕死者矣人之生章第七十六人之生也柔弱其死也堅强草木之生也柔脆其死也枯槁故堅强者死之徒也柔弱者生之徒也是以兵强則不勝木强則共故堅强居下柔弱處上人之生也骨弱筋柔其死也筋骨堅强草木之生也甲脆枝柔其死也枝葉枯槁故堅强者死之徒柔弱者生之徒理之然也兵强則不勝與木强之理共矣堅强死之徒故居下柔弱生之徒故處上亦天地之道所宜然天之道章第七十七天之道其猶張弓乎高者抑之下者舉之有餘者損之不足者補之天之道損有餘補不足人之道則不然損不足以奉有餘孰能損有餘而奉不足於天下者其唯道乎是以聖人爲而不恃功成不居其不欲見賢也天之道以中爲至而已無過與不及也其猶張弓乎高者抑之不使之有餘故有餘者損下者舉之不使之不足故不足者補蓋天道减盈滿補虚空毁强盛益衰弱人之道則一切反此損不足以奉有餘能以有餘之道奉天下者唯天道爲然聖人體道者也故爲而不恃功成不居未嘗以所長而自見於人故常無損此聖人之所以能天天下柔弱章第七十八天下莫柔弱於水而攻堅强者莫之能先以其無以易之也柔之勝剛弱之勝强天下莫不知而莫之能行是以聖人言受國之垢是謂社稷主受國之不祥是謂天下王正言若反天下莫柔弱於水而能攻堅强之物物莫能勝者以其有常而無以易之也故幾於道矣柔之勝剛弱之勝强天下莫不知而莫之能行何哉以其益生以其心使氣故失柔弱之道也夫柔弱有常而無以易之者其唯天地之道乎唯地之道受國之垢而不自化乃化化者也是謂社稷主此之謂柔之勝剛者歟唯天之道受國之不祥而不自生乃生生者也是謂天下王此之謂弱之勝强者歟夫正言若反者受國之垢與不祥也以正言之若反者矣和大怨章第七十九和大怨者必有餘怨安可以爲善是以聖人執左契而不責於人故有德司契無德司徹天道無親常與善人陽爲德無爲也陰爲怨有爲也世之人勇動於敢爲故有怨加以知慧仁義以和大怨怨愈多矣夫若是者安可以爲善且知慧外通仁義多責故勇動多怨是以聖人執天之行處無爲之事行不言之教嘗予於人而不取也故不責於人何怨之有上德無爲而報怨以德故曰有德司契下德有爲而以和大怨故曰無德司徹天之道是謂上德者無親無疏唯善人無爲者常與之小國寡民章第八十小國寡民使民有什伯之器而不用也使民重死而不遠徙雖有舟輿無所乗之雖有甲兵無所陳之使民復結繩而用之甘其食美其服安其俗樂其業鄰國相望鷄犬之聲相聞使民至老死不相與往來九隅八區寓以小國況至德之世地不加闢民不加聚能使一國若一家一家若一身蓋我好靜而民自正雖有智者創於前巧者述於後民亦無機心之累故使民有什伯之器而不用也於是時也民皆樂生安土自守其國是重死而不遠徙也以不遠徙也故無川途之險雖有舟輿無所乗之無攻戰之患雖有甲兵無所陳之大信不約何假書契乃復結繩而用之故力田而甘其食躬桑而美其服懷土而安其居存生而樂其俗居相比也聲相聞也而不相往來無欲無求莫之爲而常自然此之謂至德信言不美章第八十一信言不美美言不信善者不辯辯者不善知者不博博者不知聖人無積既以爲人己愈有既以與人己愈多天之道利而不害聖人之道爲而不爭信言者希言也其出口也淡乎其無味故不美美言者貌言也其於人也輕諾必寡信故不信天道不言而常善應故善者不辯和大怨者安可以爲善故辯者不善知道者必達於理達理則將以反說約也故知者不博以博溺心則聞見愈多不如其約也故博者不知夫不美也不辯也不博也所謂在己無居者也聖人之道在己無居則運而無所積故聖人無積以有積故不足無藏故有餘聖人無積故能以有餘之道奉天下天下皆往資焉而不匱故既以爲人己愈有既以與人己愈多也夫聖人之道即天之道是已惟天之道利而不害故聖人之道爲而不爭且天以美利利天下何害之有聖人出爲於無爲亦非亂天之經逆物之情也又復何爭焉此德經也而言終及於此者以德兼於道道兼於天不明於天斯不通於聖故混元以此終焉古之聖人由道以顯教因言以見道道本無形妙不可測然不假於言則道何縁而明苟言不盡意則直書辭稱微妙難識微妙難識學者莫知其根道德眞經解卷下
