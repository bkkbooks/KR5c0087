body:
  text: 無名氏解道可道章第一道可道非常道生殺以時物之道也德業以脩人之道也男女以别家之道也法度以明國之道也此夭下之常道聖凡之同有者也若可道之道應變無滯與物無方非耳而聽其希聲非目而觀其眞色得其微者探神化于寥寥知其遠者達眞筌于不測動乃應于萬機靜不流于一曲則常之道焉能如此名可名非常名至眞之名不附于形形則有盛衰之相代至眞之名不寓于數數則有變窮之相更是以可名搏之而不得象之而不似迎隨而首尾不能見鑽仰而堅高莫可及不隨物而有定執體而有用以常無而與道爲合而名自生焉非常名之可如也無名天地之始有名萬物之母昔道未判之際非陰陽之可論造化之可推及炁適于清得之者爲天炁適于濁得之者爲地天地之兩得以清爲陽以濁爲陰陽者能造陰者能化此萬物所以生也以無則爲道獨而天地得之此無名所以天地之始以有則天地爲合而萬物生之此有名所以萬物之母始則言其炁母則言其形炁也形也亦道之有無耳常無欲以觀其妙常有欲以觀其徼此兩者同出而異名同謂之玄玄之又玄衆妙之門恍爾而來自何而來惚爾而去自何而去虛而不停于一物空而不鑒于一形此所謂常無也恍爾而來來之必有其象惚爾而去去之必有其物虚則神集也不動而動空則眞藴也不化而化此乃常有也常無也守于無爲常有也脩于有作無爲則妙有作則徼此兩者同出而異名矣大抵皆可謂之玄歟且玄者道有可觀猶天之色可視而不知其然玄之又玄乃得之又得而達之尤深者也故曰衆妙之門以其能出入于大道故矣天下皆知章第二天下皆知美之爲美斯惡已皆知善之爲善斯不善已故有無之相生難易之相成長短之相形高下之相傾音聲之相和前後之相隨道散于事物雜于性初受之眞人爲之僞始禀之和舛而爲乖此昔之美者今而爲惡向之善者背而不善斯美惡之兩途善不善之不一也聖人不爲有惡而不美已不爲有不善而不善已亦以達其性耳非與衆人美惡之相隨善不善之相分也苟欲一之則性均爲至矣又奚有有無難易長短高下音聲前後哉此聖人之教所以爲此而行焉是以聖人處無爲之事行不言之教聖人以道治己以功加人蓋謂彼無長慮待聖而後慮彼無獨見待聖而後見若不示之以教則柔而自溺愚而自弱不能趨聖人之道矣我乃儲神于淵默而使彼觀風而動處思于寂寞而使彼視化而爲慮事物之煩有以耗吾之聰明我則無事慮言語之多有以亂吾之眞緒我則不言自然事濟于下教立于上而天下之民不率而率矣固無反道之弊耳萬物作而不辭聖人出而萬物出聖人入而萬物入聖人者乃萬物之所覩是以聖人在上萬物並作而各遂其宜無失性之咎蓋吾無所用其心哉凡以順物之理而已以至興衰烏有辭也設若政事未脩教化未明應出而入應取而與擾擾天下之心紛紛萬物之態如此雖作未有不辭者也萬物作而不辭亦待乎聖人之世生而不有爲而不恃功成而不居夫惟不居是以不去大道之設不以物我而有分高卑而有間以心達心則夭下之心我之心也以形養形則萬物之形我之形也又奚有兩其意哉聖人體道而濟物屈己以待人伏吾之巧以救其拙推吾之能以率其鄙功乃至于無窮業乃至于可大固爲不可加焉聖人慮其滿而有溢故乃抑之慮其盈而有虧故乃損之大而充塞不自以爲足妙而莫測不自以爲神生而不生爲而不爲功而不功如是則物不能我遷時不能我徙而處乎道矣是以不去不尚賢章第三不尚賢使民不爭不貴難得之貨使民不爲盜不見可欲使心不亂是以聖人之治也虛其心實其腹弱其志强其骨常使民無知無欲使夫知者不敢爲也爲無爲則無不治矣性本無分而習以遷之物本無二而情所異之習遷于性則賢者常爲人之所慕情異于物則難得者常爲人之所求慕于賢而不及則反以爲爭求于貨而不足則反以爲盜是二者使民失性而妄知養情而苟欲安可以見吾之道哉莫若使之心之虚也賢鄙不停于内而彼我無分腹之實紛也華不誘于外而衣食以足弱其志以自柔而不好勝于人强其骨以自立而不耽利于物所以天下之民無妄見之知天下之民亡苟求之欲則聖人之爲無不治矣則不尚賢之篇乃復人之性反物之情而根乎道者也道沖章第四道沖而用之或不盈道之舒可以充乎四極而不以爲滿道之卷可以隱乎纖芥而不以爲微以體則至虚物之來者無不應以用則至變事之至者無不接不抗于太高高恐下者不能及不即于太卑卑恐高者不能俯如此不惟不盈又至于不乆自非處陰陽之中曷以能此故曰道沖而用之或不盈沖者陰陽之中無過不及之義也淵兮似萬物之宗深而莫測之謂淵微而莫窮之謂道道之無則天地以爲始道之有則萬物以爲母言其母則知萬物生乎道者也言其宗則知萬物本乎道者也既爲其宗何云似之蓋道乃無形不可以定體言之故曰淵兮似萬物之宗也挫其銳解其紛和其光同其塵湛兮似或存人之處道閑意馬于空虚湛性源于寂寞喜怒藏于無事之鄉好惡鏁于不思之地則以淡居己以靜對物不顯明于外則和之而若晦不獨異于衆則同之而若愚如是于道也弗視而見弗爲而成而無事物之累哉設使不挫其銳而專以意必至于輕動而傷吾之性不解其紛而專以事必至于多擾而亂吾之眞不和其光道必失于炫不同其塵名必失于矜如是於道也視之不見爲之不成而常以事物爲累哉學之者可不愼歟此于四事之後所以繼之曰湛兮似或存也道無定體若特以存而言之非道也故似或耳吾不知誰之子象帝之先觀道之所來出于無爲生于清靜操之則存捨之則亡不爲强而多不爲懦而寡則虚無之至眞常之妙雖天地以我爲始雖萬物以我爲宗兆于莫測探于莫先彼象有形也我則處之于未形之初彼帝有物也我則居之于無物之上如此豈可以子名之故曰吾不知誰之子象帝之先也天地不仁章第五天地不仁以萬物爲芻狗聖人不仁以百姓爲芻狗天地之間其猶橐籥乎虚而不屈動而愈出天地之于萬物任其理之自然方其時之生也與之生以育之而有雨露之滋方其時之殺也與之殺以凋之而有雪霜之變如此必不係干一物不累于一時凡以待其理而已特謂之芻狗者方其祭祀之時貢以至誠而致其欽愛之意及其禮畢棄以無用若看糞壞此非厚于初而薄于終愛于前而惡于後乃理之然也聖人之於百姓又非異此方其致愛也如保赤子其致敬也若承大祭則親愛之心莫大于是及其有不可愛者罰以肆其威而視命如芥有不可敬者刑以殺其辜而觀生若閑此非聖人留情于賞罰也亦任其理之然而體乎天地耳若非如此焉能受萬物而不窮接萬變而不溺好其生者與之生而不匱欲其善者與之善而不已其應無方其出無盡乃橐籥之若也故又繼之虚而不屈動而愈出也云耳多言數窮不如守中聖人動則用道靜則體道居靜之時以道爲同湛兮自養而不與事交不與物接又奚有言之弊也及其動而用道無言以應變則道至于有窮雖言之可尚必簡以當理要以合道而不務多以爲泛也故曰多言數窮不如守中乃其當歟谷神不死章第六谷神不死是謂玄牝玄牝之門是謂天地根綿綿若存用之不勤虚而能應其應無窮妙而莫測其測無方且谷者應萬有而不留于一物神者受萬化而不滯于一原不留于一物則其虚不至于盈何虧之有不滯于一原其化必不至于窮何終之有此谷神所以有不死之兆爾是謂玄牝者道之于人始降于無終成于有無者以炁而言有者以形而喻玄牝者乃形之有者也人身之中以玄牝爲生虚以應我之運妙而成吾之化降者由此而升往者由此而還則寸炁綿綿眞靈寂寂而有長生之理焉然人所以不能生者非玄牝之愆止人不能虚且靜矣天長地乆章第七天長地乆天地所以能長且乆者以其不自生故能長生是以聖人後其身而身先外其身而身存非以其無私邪故能成其私其體至高濟羣生而不有者此天之所以長也其勢博厚載萬物而不辭者此地之所以乆也天長也其覆萬世而不傾地乆也其載古今而不陷此非天地固所以長乆而不傾陷也蓋不有其生自然而長生矣聖人體乎天地思慕長生焉敢有其身也故抑高而就卑和光而同物知雖先也不敢爲人之先而常處其後身雖聖也不敢超衆之爲而常晦其跡如此乃後其身而身先外其身而身存故能成其私而同天地之長乆矣自非不自生爲足語此上善若水章第八上善若水水善利萬物而不爭處衆人之所惡故幾於道居善地心善淵與善仁言善信政善治事善能動善時夫惟不爭故無尤矣昔道在于上混然而無固無殊品以雜其眞洎離無入有於性則存善於五行則生水而善之與水乃離道近矣此所以相譬而立焉故曰上善若水善之謂性忘心而入寂澄己而利物蔽爭勝之原若其固有亡取與之分如其自然求之而後應而不應于妄求靜之而徐清而不清于非靜深以自達明而守晦以至于濟物之仁必然之信任理之治適變之能無非水之不相一也大抵此篇之意乃上德不德上士無爭之意也何且居善地者必就于下心善淵者水深則回與善仁者利達萬物言善信者外不欺人政善治者執柔弱而勝剛强事善能者渡舟楫而無不濟動善時者可行則行可止則止凡斯數事若有其善而好勝于物定以有尤焉能幾於道也持而盈之章第九持而盈之不如其已揣而銳之不可長保道之爲物酌焉而不竭注焉而不盈無欠以爲不足無贅以爲有餘悉皆虚其中以無滿空其藴而受物又何必持其盈以爲其約苟持其盈不如其已天下之事來之復去新之代舊出没之繁不可以計窮利害之雜不可以智筭若焦心以應無盡之事窮思以待不齊之物雖有揣之之巧銳之之利亦有時而耗竭矣仕道者不然棄塵緒于事物保眞情于不爲則吾之所享長其保焉金玉滿堂莫之能守富貴而驕自遺其咎以道觀物則道爲眞物爲假以德觀物則德爲長物爲短至人以道養德以德修道而常昂于物物之上以道德爲樂者知物皆爲假而徒役吾之神思耳此金玉者雖爲其寳以至人觀之乃寄來之物奚可珍之苟或珍之寧無咎乎功成名遂身退天之道時不能常行行之而有止物不能常興興之而有廢況人進退有義義可從而不可違去就有命命可順而不可乖苟義可退也違義以進之必有其害命可去也乖命以就而就之必有其損況成敗之相隨榮辱之相代猶首尾之相應禍福之相伏豈可恃進以終身之榮而不顧憂患哉此功成名遂身退乃天之道也載營魄章第十載營魄抱一能無離乎人受命已來保神之後陰陽具于一身造化全于四大其性也得爾沖和其炁也歸爾眞正又奚有外物之患哉此乃生之理也及神逐變遷慮從物起嗜慾生于胸中勞役耽于身内所得之和變而爲乖所歸之正適以爲邪而神於是爲魄之所奪不能載魄乃至于散亂而不保矣此死之道也至人知其如此忘其物念灰彼塵心知神乃我之主則安而不亂以至于明知精乃我之本則寧而不摇以至于一而後吾之神也洞于靈而不爲罔吾之精也保于眞而不爲兩内無魄之所載外無物之所遷則道不幾乎息矣切咍愚者背陽而向陰滅神而就魄日馳萬變之勞不守至精之一及其死也沉淪陰道落彼異生斯蓋魄之所載而不能抱一以自全故也痛之痛之專炁致柔能如嬰兒乎人自保生以炁養之人自赴死以炁損之君子不以養人者害人故專炁致柔以全其眞也且至人之性習于不動動則哀樂生焉至人之性安于不悖悖則暴怒起焉哀樂生而情亂于中暴怒起而炁作于内如是而養眞者未之有也炁何以專而致柔莫若以志帥之以神御之安心于清靜致意于虚閑縛五賊于無染之鄉囚無明于至弱之界而後炁適于柔而不動于觸非嬰兒而何哉滌除玄覽能無疵乎性有其垢可以滌之性有其穢可以除之自非清以養己靜而對物焉能如此愛民治國能無爲乎治本出于無爲僞常生于有作況人離性則失本役物則喪己欲愛民于保生治國于常安莫若使之安性而不爲矣天門開闔能爲雌乎萬物出入以天爲門天之出入以道爲户至人者應天門以出入玄域遊道户而升降眞界達時消息與物盈虚非妄有所作也安于無心而已明白四達能無知乎燭幽之謂明見素之謂白周流無壅之謂四達如此可謂知知矣知而不知乃爲至也生之畜之生而不有爲而不恃道有其造可以生之道有其化可以畜之然道可以生畜萬物自非達之不可似也長而不宰是謂玄德萬世不弊之謂道豈非長乎無爲而萬物化豈非不宰乎三十輻章第十一三十輻共一轂當其無有車之用埏埴以爲器當其無有器之用鑿户牖以爲室當其無有室之用故有之以爲利無之以爲用車以有運轉之理而無凝于物器以有收歛之名而不散于外室則爲所居之常而得安于中特以言無有之用者且形而上者謂之道形而下者謂之器方其形而上也以無爲用其用無窮而罔有新故之敝方其形而下也以有爲利其利有盡而有興廢之咎此所以於車言無有車之用於器言無有器之用於室言無有室之用若以玄者論之則運吾之炁者河車收吾之眞者鼎器宅吾之神者絳室是三者果如何哉乃以無爲用者也五色章第十二五色令人目盲五音令人耳聾五味令人口爽眞非不欲保于内性非不欲復于初而所以不能者常彼外物以誘之故也目注于視吾將以慧觀而見其眞色所以不見者物之色以盲之耳注于聽吾將以定力而聞其眞聲所以不聞者物之聲以聾之口注于味吾將以至淡而知其眞味所以不知者物之味以爽之目至于盲而閉其慧觀耳至于聾而潰其定力口至于爽而不能居淡九邪由此而作眞元因此而喪乃衆人爾奚可以語道哉馳騁田獵令人心發狂難得之貨令人行妨是以聖人爲腹不爲目故去彼取此七情生于放縱三毒起于貪求且性者以心爲表心者以性爲裏性定心澄無事于逐物則田獵與難得之貨奚足爲患哉馳騁田獵則血炁俱作敷發于外而心所以作狂好難得之貨則偷合苟容妄求曲取而行所以妨此皆聖人之所不爲也而繼之以爲腹不爲目者以明其養内而不養外故也寵辱章第十三寵辱若驚貴大患若身何謂寵辱寵爲下得之若驚失之若驚是謂寵辱若驚何謂貴大患若身吾所以有大患者爲吾有身心忠于道而係于物則喜于榮華而驚于憂患常以得失爲累而不能以浩浩然矣且人之居寵而受其禄得榮于己以禄居之則顯而不辭以榮處之則驕而不法矜誇焉而尊以惡卑光顯焉而高以恥下則積金繫馬寧不爲之寵哉斯奚足以爲辱也一有所失自以爲慊至人不然貴不爲樂賤不爲憂受禄萬鍾食前方丈吾非有也簞食瓢飲蓬居甕室吾非憂也得之囂囂失之囂囂曾足以驚乎惟有其寵者辱莫大焉非驚而何及吾無身吾有何患故貴以身爲天下若可託天下人受命于無成形于有且形之成于有也合地水風火之假生精神炁血之實居處焉不能免寒暑之所拘動作焉不能外勞役之所使以至于飲水食穀以充于内衣帛服布以禦于外或過焉爲有餘欠焉爲不足不能無患焉惟其盜陰陽之眞情奪造化之正理喜怒去于胸中寒暑逃于物外脱四大之假以無其身反九變之眞而入于道則吾以是無無以不生空空而不化又何有患也經謂及吾無身吾有何患乃此歟視之不見章第十四視之不見名曰夷聽之不聞名曰希搏之不得名曰微道處太素之上而無其色則色之所色者雖離婁之明無所施其視道處太虚之中而無其聲則聲之所聲雖師曠之聰無所專其聽道在無名之先而無其象則象之所象雖烏獲之力不能舉其重此夷所以視之而不見希所以聽之而不聞微所以搏之而不得也此以常者言之若以能開慧目以觀眞色則視之而可見啓玄耳以聽希音則聽之而可聞施妙力以斡大象則搏之而可得常人所以不能者五色盲于目五音聾于耳五事蔽于心故也此三者不可致詰故混而爲一道無在道無不在不可以物名之不可以象假之及其濟天下之用則萬物而無非道者且道在物也一莫得以分之而聖人所以言夷希微各異者設以視聽搏之趣爾要其所以爲異乃無此之異也混而爲一爾豈可以致詰哉其上不皦其下不昧繩繩不可名復歸于無物是謂無狀之狀無物之象是謂惚恍迎之不見其首隨之不見其後執古之道以御今之有能知古始是謂道紀物之附于陽者其升以明附于陰者其降以晦升而明者有性者以趨降而晦者有形者以逃天下之人於是以知向背之理若道則不然炁狀也上不爲陽而明無物也下不爲陰而晦其來也不行而至豈可迎乎其去也不疾而速豈可隨乎欲窮其本也探上古而不知其始欲究其末也御當今而不知其變及其以玄推之上有明以爲其皦則光照于物物下有晦以爲其昧則炁出于孛孛其上之昩者可以升而向之其下之昧者可以塞而背之來之者吾有靈以迎其前去之者吾有神以隨其後惚兮惚則無物以有物恍兮恍則不狀而有狀此非與經固有反蓋老氏之言微而顯矣古之善爲士章第十五古之善爲士者微妙玄通深不可識小人精于物君子精于道精于物者以物役之其巧有盡精于道者以道養之其化無窮是以古之善爲士者藏于至幽隱于不測盡其性以無方窮其理而不滯則有言也言合于道而衆不能曉有作也作契于理而衆不能達以至于捜賾亡形而我以獨見驅役有象而我以獨斡周流六虚而同天莫可學酬酢萬變而治物無所壅則吾之微妙玄通人固以不識也非我特欲不識而專以異也我道之深而彼不能識也故矣豫兮若冬涉川猶兮若畏四鄰浩浩處道不以吉凶而有事于思寂寂守玄不以憂患而有事于動無思也遇物而後作臨事而後爲必待可行之時而後行之可用之世而後用之又何容心哉此所以豫若冬涉川也冬涉川者逼而後動不得已也非所以爲未然之見何非不見于未然也無心而已無動也寂然而退居幽宇以至于不出密然而靜處玄宅而至于不爲歛己焉常恐踰閑以自警屈身焉以至閉户而自約猶若畏四鄰者乃其此也畏四鄰者安其居而不岀也非所以不敢出也蓋退藏于密而不與物交故矣是二者一事于無思一事于無動非古之善士孰能如此儼若容貌不莊則無威可畏身不重則無儀可象況事道者所處玄宅所履眞路所言則法言所行則法行豈可不嚴而勵己容而畏物哉則儼若容者乃其宜也涣若冰將釋性本空虚因物而實性本澄靜因物而動且物之所以涣者陽也所以結者陰也陽以涣之則舒舒以自復優優而自遂而不與物爲之聚散陰以結之無者附于有散者著于實其形厚者不能薄其勢小者不能大此乃有在之理非無在之意也何以況之由水之性或就下以適東流川而學海或升而爲雲雨或導而爲江河源之深其流乃長流之長者其澤必遠甚以爲自得哉及陰炁凝以爲冰則其源以塞其流以阻而不能若水以四達矣此善爲士者其性之涣所以若冰之將釋也求其以復初矣敦兮其若樸文勝質其質必滅華勝實其實不顯爲士之道不吐英華以妨大素不尚浮虚以掩大材凡以守天性之純而求爲不雜收天眞之粹而求爲不僞處于厚而不處于薄居其全而不居其駮此經乃謂敦兮其若樸也曠兮其若谷澹足萬物而不以爲有湛無一毫而不以爲無物之來者應之而不留事之至者容之而不滯此性之虚然善應而不以物爲心哉則曠兮所以若谷也渾兮其若濁和其光則知韜以自晦同其塵則知混而致虚極守靜篤萬物並作吾以觀其復凡物芸芸必歸其根歸根曰靜靜曰復命出而不反其出有窮往而不復其往必弊夭之所以有春者生以岀也有秋者反以復也生而出以爲命反而復以爲性且曰有生斯有性何必待復而後見性曰生者動也動則紛紛性莫失焉所言歸根曰靜者反其性也又曰既靜以見性此却云靜以復命何也曰生而有命則命常因性失而亡既靜以見性則命乃復矣此盡性而後至于命也復命曰常知常曰明不知常妄作凶靜乃性之本有時而動者以應物也非我性斯動矣常乃道之體遇物而變者以應時也非我道斯變矣聖人若退藏之際而不爲物居寂默之中而不應時則其性靜而不動其道常而不變此曰復命曰常者靜而不出以得其性也知常曰明者虚而自見以得其道也故矣反以不知常而應變則失性違道之事無所不至非凶而何乃繼之曰不知常妄作凶也云耳容乃公公乃王王乃天天乃道萬變不齊羣動不一以擇之則洪纖而有曲以分之則高下而有間聖人欲一之以羣動齊之以萬變莫非容也斯容何以致之因于知常而已惟其容也觸之者寬以無私應之者一而不二其平也衡不可以奪其虚也谷不可以過由是自容而至于大公矣既以公之則可宰制羣生法令天下萬務之煩而我可以析之四海之大而自隱此者養素于内而善俗者也今渾兮其若濁何以異此孰能濁以靜之徐清孰能安以動之徐生水之清者有物以撓之其清乃濁人之安者有物以誘之其安必動濁以亂其清而不能事之以靜則清因濁滅動以失安而不能變之以生則安因動危此非所以爲善士也我則不然以靜爲常而靜以徐清則濁焉爲患以動爲變而動以徐生則安何爲守如此則靜不至于失性動不至于失道而無溺于一曲也保此道者不欲盈夫惟不盈故能敝不新成物之敗者因於自成事之敝者因于自新則成敗之相復新敝之相代乃固然之理而人情之所不免也至于善士守道以自敝而其敝常新處事以自敗而其敗常成新也萬世不敝常成也終身不敗如此非他致之出于不盈而已致虚極章第十六致虚極守靜篤萬物並作生而不有有時而有者虚之未極也安而不動有時而動者靜之未篤也且道在萬物之上應萬變而不知其耗守眞一而不知其竭廓之以宇宙之大莫見其涯濟之以羣生之出莫知其動空空而至無湛湛而常寂則入之多不以爲盈出之衆不以爲擾則虚於是致之以極靜於是守之以篤而萬物所以並作也萬物之來始于無形終于有象若虚之不極則出生者不能無壅靜之不篤則還生者不能無窮而寓我可以歸之則人之道至此而最矣人道既最以如何哉乃通于天而已人至于通天可謂至矣而人物何足以禦之乃道爾此經所以容乃公公乃王王乃天天乃道也太上章第十七太上下知有之其次親之譽之其次畏之侮之昔聖人之治儲思于淵默恭已于巖廓無爲以待天下之爲無言以應天下之變皷舞以神則號令不知所自出教化以身則政事不知所自行則民不化而化成不治而治致不待率而後應不待誅而後畏日用我德不知德之可懷日由吾道不知道之可向則浩浩自遂其宜熙熙自獲其所此乃太上之治以自然爲化故曰下知有之逮三皇之後制度以修賞罰以出有愛人之政而如保赤子有歸民之德而若從流水以恩撫之則百姓親之如父母以仁恤之則百姓譽之若天地斯乃有爲之世以政而治民者也故人以親而譽之其次不然或峻刑嚴法以設威于上或反道敗德而失政于下一則畏彼之威而苟免之過以至于恥一則侮彼之政而亂其常以至于爲非則法雖可畏而成于不畏德既可侮而不能無侮此下以愧于親譽上以慚于知有者寧可不愼擇歟信不足有不信偤其貴言功成事遂百姓謂我自然内有諸己外不欺物乃謂之信則信者聖人以爲將命令宣志意而達乎四方者也苟不足焉人何信之聖人乃思之而後言而言不以爲妄慮之而後語而語不以爲欺有命焉若卜筮而可孚有令焉如影響之可應則信矣有不足也其實出于貴言而已貴則不輕貴則不賤不輕以重之而言無亂發不賤以尊之而言無虚設惟其如此功乃至于成事乃至于遂而百姓自然矣大道廢章第十八大道廢有仁義智慧出有大僞聖人臨事而無意對物而無心無意也則恤愛兼制之務不彰于外無心也則謀慮知見之爲不起于中而悉以道爲出處以道爲語默故也及萬緒交起百態互生愛惡之情於是而有與奪之權於是而作則吾之大道分而爲二而仁義所以行也性失于多知聖人以約爲守機生于遠見聖人以晦爲用知不以約有不及者則智於是而鑿見不以晦有不明者則機於是而巧是以智慧出于胸中大僞生于構内而於吾道必以遠矣絶聖棄智章第十九絶聖棄智民利百倍无所不通之謂聖无所不知之謂智則聖也者成性以達己體道而御物而特以絶者不敢有其聖以爲衆人之所不及矣智也者彰往而見其未然察來而知其未變特以謂棄者不敢有其智而爲衆人之所不知苟以有聖則不及者離性以爲詐苟以有智則不知者捨眞以爲僞惟其絶而棄之則民各任其性矣其利而百倍焉絶仁棄義民復孝慈天有五典人有五常則父子者乃天之叙也天叙之始良知出于自然良能本于不慮而孝慈之性固存于父子之間奚待教以率之所以父子不親者有仁義以妨之何仁者愛人及其所不愛義者宜人及其所不宜則物爭以愛而不愛者亂人尚以宜而不宜者悖孝慈或因此失矣若絶而棄之則民復孝慈絶巧棄利盜賊無有尚巧必窮好利必爭盜賊之源也見素抱樸少私寡欲從流者流遠而必涸圖枝者枝多而必缺今以捨流而窮源其源必澄棄枝而就本其本必固所以棄絶三事而今何屬哉必以見性而已故見素抱樸少私寡欲而繼于後也無塵以染其質之謂素無華以亂其本之謂樸少私則不昏惑以著物寡欲則不盜縱以喪己斯者若非去亂性之本何以哉道德眞經解卷上
